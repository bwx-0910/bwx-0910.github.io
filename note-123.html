<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>《原则》· 小瑄的生活记录</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/note-style.css">
    <!-- Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 返回导航 -->
        <nav class="note-nav">
            <a href="index.html" class="back-link">← 返回首页</a>
            <a href="admin.html" class="admin-link">✏️ 编辑</a>
        </nav>

        <!-- 笔记头部 -->
        <article class="note-article">
            <header class="note-header">
                <div class="note-icon">📊</div>
                <h1 class="note-title">《原则》读书笔记</h1>
                <div class="note-meta">
                    <span class="meta-item">📅 2026-01-14</span>
                    <span class="meta-item">📂 管理</span>
                </div>
                <div class="note-tags">
                    <span class="tag">#管理</span><span class="tag">#决策</span><span class="tag">#原则</span>
                </div>
            </header>

            <!-- 笔记内容 -->
            <div class="note-content" id="noteContent">
                <h1>《原则》读书笔记</h1>
<p>这本书让我学到了...</p>
            </div>
        </article>

        <!-- 底部导航 -->
        <footer class="note-footer">
            <a href="index.html" class="btn-back">← 返回首页</a>
        </footer>
    </div>

    <script>
        // 渲染 Markdown 内容
        document.addEventListener('DOMContentLoaded', function() {
            const contentDiv = document.getElementById('noteContent');
            if (typeof marked !== 'undefined' && contentDiv) {
                marked.setOptions({
                    breaks: true,
                    gfm: true,
                    highlight: function(code, lang) {
                        return code;
                    }
                });
                // contentDiv.innerHTML = marked.parse(contentDiv.textContent);
            }
        });
    </script>
</body>
</html>
