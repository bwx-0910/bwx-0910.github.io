name: Auto Build Data.js

on:
  push:
    branches:
      - main
    paths:
      - 'notes/**/*.md'   # 当 notes 目录下的 md 文件改变时触发
      - 'poems/**/*.md'   # 当 poems 目录下的 md 文件改变时触发
      - 'diaries/**/*.md' # 日记：管理页保存后自动重建 data.js

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write  # 授予写入权限

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 2  # 获取最近两次提交，用于检测变化

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install markdown

      - name: Build data.js
        run: |
          python build.py

      - name: Commit and Push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/data.js note-*.html index.html
          git diff --staged --quiet || git commit -m "🤖 自动构建: 更新 data.js 和笔记页面 [skip ci]"
          git push
