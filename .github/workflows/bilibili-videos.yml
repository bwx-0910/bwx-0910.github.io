name: Sync Bilibili videos

on:
  schedule:
    # 每天 UTC 3:00、15:00 各同步一次（约北京时间 11:00 / 23:00）
    - cron: '0 3,15 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/fetch_bilibili_videos.py'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Fetch Bilibili space video list
        run: python scripts/fetch_bilibili_videos.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add js/bilibili-videos.json
          if git diff --staged --quiet; then
            echo "No changes to bilibili-videos.json"
          else
            git commit -m "chore: sync bilibili videos [skip ci]"
            git push
          fi
