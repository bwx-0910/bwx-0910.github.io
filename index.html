            <nav class="nav">
                <a href="#" data-tab="all" class="nav-link active">全部</a>

    <main class="main">
        <div class="container">
            <!-- 全部内容 -->
            <section id="all-section" class="content-section active">
                <div class="posts-grid" id="all-posts"></div>
            </section>

        <!-- 读书笔记 -->
        <section id="notes-section" class="content-section">
            <div class="posts-grid" id="notes-posts"></div>

            <p id="videos-hint" class="section-hint" style="display: none;">

            <!-- 关于 -->

                <div class="about-card">
                    <h2>关于</h2>
                    <div class="about-card-inner">

                            <p>GitHub: <a href="https://github.com/bwx-0910" target="_blank" rel="noopener noreferrer">@bwx-0910</a></p>

                    </div>
                </div>

    <footer class="footer">
