<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>围城1 · 小瑄的生活记录</title>
    <!-- 网站图标 -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    <link rel="stylesheet" href="css/style.css?v=1780559634">
    <link rel="stylesheet" href="css/note-style.css?v=1780559634">
    <!-- Markdown 渲染 -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
    <div class="container">
        <!-- 返回导航 -->
        <nav class="note-nav">
            <a href="index.html" class="back-link">← 返回首页</a>
            <a href="admin.html" class="admin-link">✏️ 编辑</a>
        </nav>

        <!-- 笔记头部 -->
        <article class="note-article">
            <header class="note-header">
                
                <div class="note-icon">📖</div>
                <h1 class="note-title">围城1</h1>
                <div class="note-meta">
                    <span class="meta-item">📅 2026-05-12</span>
                    <span class="meta-item">📂 </span>
                    
                </div>
                <div class="note-tags">
                    
                </div>
            </header>

            <!-- 标签导航 -->
            <div class="note-tabs">
                <button class="tab-btn active" onclick="switchTab('quotes')">📌 书籍摘录</button>
                <button class="tab-btn" onclick="switchTab('notes')">📝 笔记内容</button>
            </div>

            <!-- 书籍摘录标签页 -->
            <div class="tab-content active" id="quotesTab">
                <div class="quotes-section">
                    <h2>📌 书籍摘录</h2><div class="quotes-grid"><div class="quote-card quote-color-1 quote-long"><p>鸿渐说：​“你从前常对我称赞你这位高老师头脑很好，我这次来了，看他所作所为，并不高明。​”辛楣说：​“也许那时候我年纪轻，阅历浅，没看清人。不过我想这几年来高松年地位高了，一个人地位高了，会变得糊涂的。​”事实上，一个人的缺点正像猴子的尾巴，猴子蹲在地面的时候，尾巴是看不见的，直到他向树上爬，就把后部供大众瞻仰，可是这红臀长尾巴本来就有，并非地位爬高了的新标识。</p></div></div>
                </div>
            </div>

            <!-- 笔记内容标签页 -->
            <div class="tab-content" id="notesTab">
                <div class="note-content">
                    <p>1</p>
                </div>
            </div>
        </article>

        <!-- 底部导航 -->
        <footer class="note-footer">
            <a href="index.html" class="btn-back">← 返回首页</a>
        </footer>
    </div>

    <script>
        // 标签切换功能
        function switchTab(tabName) {
            // 移除所有活动状态
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            // 激活选中的标签
            if (tabName === 'quotes') {
                document.querySelector('[onclick="switchTab(\'quotes\')"]').classList.add('active');
                document.getElementById('quotesTab').classList.add('active');
            } else if (tabName === 'notes') {
                document.querySelector('[onclick="switchTab(\'notes\')"]').classList.add('active');
                document.getElementById('notesTab').classList.add('active');
            }
        }

        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            // 默认显示书籍摘录标签
            switchTab('quotes');
        });
    </script>
</body>
</html>
