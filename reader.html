<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电子书 · 小瑄的生活记录</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📖</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: #f7f7f8;
            color: #1f2937;
            min-height: 100vh;
        }

        /* 顶部导航 */
        .navbar {
            background: #ffffff;
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 1px 0 rgba(0,0,0,0.06);
            border-bottom: 1px solid rgba(0,0,0,0.06);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: #374151;
            font-size: 1.15rem;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .navbar-brand:hover {
            color: #111827;
        }

        .navbar-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .btn {
            background: #1f2937;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
            transition: opacity 0.2s, transform 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn:hover {
            opacity: 0.92;
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
            opacity: 1;
        }

        /* 主容器 */
        .main-container {
            margin-top: 70px;
            display: flex;
            height: calc(100vh - 70px);
        }

        /* 侧边栏 - 书架 */
        .sidebar {
            width: 280px;
            background: #ffffff;
            padding: 20px;
            overflow-y: auto;
            border-right: 1px solid rgba(0,0,0,0.06);
        }

        .sidebar-title {
            font-size: 1.05rem;
            margin-bottom: 20px;
            color: #1f2937;
            font-weight: 600;
            letter-spacing: 0.04em;
        }

        .book-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .book-item {
            background: #fafafa;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: border 0.2s, box-shadow 0.2s;
            border: 1px solid rgba(0,0,0,0.06);
        }

        .book-item:hover {
            border-color: #d1d5db;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .book-item.active {
            border-color: #9ca3af;
            background: #f3f4f6;
        }

        .book-item-title {
            font-weight: 600;
            margin-bottom: 5px;
            word-break: break-all;
            font-size: 0.95rem;
        }

        .book-item-info {
            font-size: 0.8rem;
            color: #6b7280;
        }

        .book-item-delete {
            float: right;
            background: none;
            border: none;
            color: #9ca3af;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .book-item-delete:hover {
            color: #374151;
        }

        /* 阅读区域 */
        .reader-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #f7f7f8;
        }

        /* 阅读器工具栏 */
        .reader-toolbar {
            background: #ffffff;
            padding: 10px 20px;
            display: none;
            align-items: center;
            justify-content: center;
            gap: 15px;
            border-bottom: 1px solid rgba(0,0,0,0.06);
        }

        .reader-toolbar.active {
            display: flex;
        }

        .page-nav {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .page-info {
            color: #6b7280;
            font-size: 0.9rem;
            min-width: 120px;
            text-align: center;
        }

        .zoom-controls {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .zoom-level {
            color: #6b7280;
            font-size: 0.9rem;
            min-width: 50px;
            text-align: center;
        }

        /* 阅读视图 */
        .reader-view {
            flex: 1;
            overflow: auto;
            display: none;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
            background: #eceef0;
        }

        .reader-view.active {
            display: flex;
        }

        #pdf-canvas {
            max-width: 100%;
            box-shadow: 0 5px 30px rgba(0,0,0,0.5);
        }

        #epub-view {
            width: 100%;
            max-width: 800px;
            min-height: 500px;
            background: white;
            box-shadow: 0 5px 30px rgba(0,0,0,0.5);
        }

        /* 欢迎页面 */
        .welcome-screen {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px;
        }

        .welcome-screen.hidden {
            display: none;
        }

        .welcome-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .welcome-title {
            font-size: 1.75rem;
            margin-bottom: 15px;
            font-weight: 600;
            color: #111827;
            letter-spacing: 0.04em;
        }

        .welcome-desc {
            color: #6b7280;
            margin-bottom: 30px;
            max-width: 500px;
            line-height: 1.8;
            font-size: 0.95rem;
        }

        .format-list {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .format-badge {
            background: #f3f4f6;
            color: #4b5563;
            padding: 10px 22px;
            border-radius: 999px;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1px solid rgba(0,0,0,0.06);
        }

        /* 拖放区域 */
        .drop-zone {
            border: 2px dashed #d1d5db;
            border-radius: 16px;
            padding: 48px 56px;
            margin: 30px 0;
            transition: background 0.2s, border-color 0.2s;
            cursor: pointer;
            background: #fafafa;
        }

        .drop-zone:hover {
            background: #ffffff;
            border-color: #9ca3af;
        }

        .drop-zone-text {
            font-size: 1rem;
            color: #6b7280;
        }

        #file-input {
            display: none;
        }

        /* 加载动画 */
        .loading {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.88);
            backdrop-filter: blur(4px);
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            color: #374151;
        }

        .loading.active {
            display: flex;
        }

        .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid #e5e7eb;
            border-top-color: #374151;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            margin-top: 20px;
        }

        /* 错误提示 */
        .error-msg {
            background: #fef2f2;
            color: #b91c1c;
            border: 1px solid #fecaca;
            padding: 14px 22px;
            border-radius: 10px;
            margin: 20px;
            display: none;
        }

        .error-msg.show {
            display: block;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }
            
            .navbar-controls {
                gap: 8px;
            }
            
            .btn {
                padding: 8px 12px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="navbar-brand">
            <span>返回首页</span>
        </a>
        <div class="navbar-controls">
            <label for="file-input" class="btn">
                📂 打开文件
            </label>
            <input type="file" id="file-input" accept=".pdf,.epub">
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="main-container">
        <!-- 侧边栏书架 -->
        <aside class="sidebar" id="sidebar">
            <h2 class="sidebar-title">我的书架</h2>
            <div class="book-list" id="book-list">
                <p style="color: #6b7280; text-align: center; font-size: 0.95rem;">书架空空如也<br>添加一本书开始阅读吧</p>
            </div>
        </aside>

        <!-- 阅读器容器 -->
        <div class="reader-container">
            <!-- 欢迎页面 -->
            <div class="welcome-screen" id="welcome-screen">
                <div class="welcome-icon" aria-hidden="true">📖</div>
                <h1 class="welcome-title">电子书阅读</h1>
                <p class="welcome-desc">
                    支持 PDF 和 EPUB 格式的电子书阅读。<br>
                    点击上方"打开文件"按钮选择电子书，或将文件拖放到下方区域。
                </p>
                <div class="drop-zone" id="drop-zone">
                    <p class="drop-zone-text">📂 点击选择文件，或将文件拖放到这里</p>
                </div>
                <div class="format-list">
                    <span class="format-badge">📄 PDF</span>
                    <span class="format-badge">📕 EPUB</span>
                </div>
                <div class="error-msg" id="error-msg"></div>
            </div>

            <!-- 阅读器工具栏 -->
            <div class="reader-toolbar" id="reader-toolbar">
                <div class="page-nav">
                    <button class="btn btn-secondary" id="prev-btn">◀ 上一页</button>
                    <span class="page-info" id="page-info">第 1 页 / 共 1 页</span>
                    <button class="btn btn-secondary" id="next-btn">下一页 ▶</button>
                </div>
                <div class="zoom-controls">
                    <button class="btn btn-secondary" id="zoom-out-btn">➖</button>
                    <span class="zoom-level" id="zoom-level">100%</span>
                    <button class="btn btn-secondary" id="zoom-in-btn">➕</button>
                </div>
            </div>

            <!-- 阅读视图 -->
            <div class="reader-view" id="reader-view">
                <canvas id="pdf-canvas"></canvas>
                <div id="epub-view"></div>
            </div>
        </div>
    </div>

    <!-- 加载动画 -->
    <div class="loading" id="loading">
        <div class="spinner"></div>
        <p class="loading-text">正在加载...</p>
    </div>

    <!-- 脚本放在最后加载 -->
    <script src="https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
    <script src="https://unpkg.com/jszip@3.10.1/dist/jszip.min.js"></script>
    <script src="https://unpkg.com/epubjs@0.3.93/dist/epub.min.js"></script>
    
    <script>
        // 检查库是否加载成功
        let pdfReady = false;
        let epubReady = false;

        // 等待 DOM 和库加载完成
        document.addEventListener('DOMContentLoaded', init);

        function init() {
            // 检查 PDF.js
            if (typeof pdfjsLib !== 'undefined') {
                pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://unpkg.com/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
                pdfReady = true;
            }

            // 检查 EPUB.js
            if (typeof ePub !== 'undefined') {
                epubReady = true;
            }

            // 绑定事件
            setupEventListeners();
            
            // 加载书架
            loadBookList();
        }

        // 状态变量
        let currentBook = null;
        let pdfDoc = null;
        let epubBook = null;
        let epubRendition = null;
        let currentPage = 1;
        let totalPages = 1;
        let zoomScale = 1.0;

        // 获取书籍列表
        function getBooks() {
            try {
                return JSON.parse(localStorage.getItem('ebook-library') || '[]');
            } catch (e) {
                return [];
            }
        }

        // 保存书籍列表
        function saveBooks(books) {
            try {
                localStorage.setItem('ebook-library', JSON.stringify(books));
            } catch (e) {
                showError('书籍太大，无法保存到书架');
            }
        }

        // 设置事件监听
        function setupEventListeners() {
            // 文件选择
            document.getElementById('file-input').addEventListener('change', handleFileSelect);

            // 拖放区域
            const dropZone = document.getElementById('drop-zone');
            dropZone.addEventListener('click', () => document.getElementById('file-input').click());
            
            // 拖放事件
            document.body.addEventListener('dragover', (e) => e.preventDefault());
            document.body.addEventListener('drop', handleDrop);

            // 翻页按钮
            document.getElementById('prev-btn').addEventListener('click', prevPage);
            document.getElementById('next-btn').addEventListener('click', nextPage);

            // 缩放按钮
            document.getElementById('zoom-in-btn').addEventListener('click', zoomIn);
            document.getElementById('zoom-out-btn').addEventListener('click', zoomOut);

            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                if (e.key === 'ArrowLeft') prevPage();
                if (e.key === 'ArrowRight') nextPage();
            });
        }

        // 加载书架列表
        function loadBookList() {
            const books = getBooks();
            const container = document.getElementById('book-list');
            
            if (books.length === 0) {
                container.innerHTML = '<p style="color: #6b7280; text-align: center; font-size: 0.95rem;">书架空空如也<br>添加一本书开始阅读吧</p>';
                return;
            }

            container.innerHTML = books.map((book, index) => `
                <div class="book-item" data-index="${index}">
                    <button class="book-item-delete" data-index="${index}">×</button>
                    <div class="book-item-title">${book.type === 'pdf' ? '📄' : '📕'} ${book.name}</div>
                    <div class="book-item-info">上次: 第 ${book.lastPage || 1} 页</div>
                </div>
            `).join('');

            // 绑定点击事件
            container.querySelectorAll('.book-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    if (!e.target.classList.contains('book-item-delete')) {
                        const index = parseInt(item.dataset.index);
                        openBookFromLibrary(index);
                    }
                });
            });

            // 绑定删除事件
            container.querySelectorAll('.book-item-delete').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const index = parseInt(btn.dataset.index);
                    deleteBook(index);
                });
            });
        }

        // 处理文件选择
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) processFile(file);
        }

        // 处理拖放
        function handleDrop(e) {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file) processFile(file);
        }

        // 处理文件
        async function processFile(file) {
            const ext = file.name.split('.').pop().toLowerCase();
            
            if (ext === 'pdf' && !pdfReady) {
                showError('PDF 库加载失败，请刷新页面重试');
                return;
            }
            
            if (ext === 'epub' && !epubReady) {
                showError('EPUB 库加载失败，请刷新页面重试');
                return;
            }
            
            if (!['pdf', 'epub'].includes(ext)) {
                showError('只支持 PDF 和 EPUB 格式！');
                return;
            }

            showLoading();

            try {
                const arrayBuffer = await file.arrayBuffer();
                
                // 先复制一份用于保存（因为 PDF.js/EPUB.js 会分离原始 buffer）
                const bufferCopy = arrayBuffer.slice(0);
                
                // 创建书籍数据
                const bookData = {
                    name: file.name,
                    type: ext,
                    lastPage: 1
                };

                // 打开书籍（使用原始 buffer）
                if (ext === 'pdf') {
                    await openPDF(arrayBuffer);
                } else {
                    await openEPUB(arrayBuffer);
                }

                currentBook = bookData;
                
                // 尝试保存到书架（小文件，使用复制的 buffer）
                if (bufferCopy.byteLength < 5 * 1024 * 1024) { // < 5MB
                    const books = getBooks();
                    const existingIndex = books.findIndex(b => b.name === file.name);
                    
                    bookData.data = Array.from(new Uint8Array(bufferCopy));
                    
                    if (existingIndex >= 0) {
                        books[existingIndex] = bookData;
                    } else {
                        books.push(bookData);
                    }
                    
                    saveBooks(books);
                    loadBookList();
                }

                // 显示阅读界面
                showReader();
                
            } catch (error) {
                console.error('加载失败:', error);
                showError('文件加载失败: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        // 从书架打开
        async function openBookFromLibrary(index) {
            const books = getBooks();
            const book = books[index];
            
            if (!book || !book.data) {
                showError('书籍数据丢失，请重新添加');
                return;
            }

            showLoading();

            try {
                const arrayBuffer = new Uint8Array(book.data).buffer;
                
                if (book.type === 'pdf') {
                    await openPDF(arrayBuffer, book.lastPage || 1);
                } else {
                    await openEPUB(arrayBuffer);
                }

                currentBook = book;
                currentBook.index = index;
                showReader();
                
            } catch (error) {
                showError('打开失败: ' + error.message);
            } finally {
                hideLoading();
            }
        }

        // 删除书籍
        function deleteBook(index) {
            if (confirm('确定要删除这本书吗？')) {
                const books = getBooks();
                books.splice(index, 1);
                saveBooks(books);
                loadBookList();
            }
        }

        // 打开 PDF
        async function openPDF(arrayBuffer, startPage = 1) {
            document.getElementById('pdf-canvas').style.display = 'block';
            document.getElementById('epub-view').style.display = 'none';

            pdfDoc = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
            totalPages = pdfDoc.numPages;
            currentPage = Math.min(startPage, totalPages);

            await renderPDFPage(currentPage);
        }

        // 渲染 PDF 页面
        async function renderPDFPage(pageNum) {
            if (!pdfDoc) return;
            
            const page = await pdfDoc.getPage(pageNum);
            const canvas = document.getElementById('pdf-canvas');
            const ctx = canvas.getContext('2d');

            const viewport = page.getViewport({ scale: zoomScale * 1.5 });
            canvas.width = viewport.width;
            canvas.height = viewport.height;

            await page.render({
                canvasContext: ctx,
                viewport: viewport
            }).promise;

            updatePageInfo();
            saveProgress();
        }

        // 打开 EPUB
        async function openEPUB(arrayBuffer) {
            document.getElementById('pdf-canvas').style.display = 'none';
            const epubContainer = document.getElementById('epub-view');
            epubContainer.style.display = 'block';
            epubContainer.innerHTML = ''; // 清空容器

            if (epubBook) {
                try { epubBook.destroy(); } catch(e) {}
            }

            try {
                epubBook = ePub(arrayBuffer);
                
                // 等待书籍元数据加载
                await epubBook.ready;
                
                // 获取容器尺寸
                const containerHeight = Math.max(500, window.innerHeight - 200);
                
                epubRendition = epubBook.renderTo('epub-view', {
                    width: '100%',
                    height: containerHeight + 'px',
                    spread: 'none',
                    flow: 'paginated'
                });

                // 显示第一页
                await epubRendition.display();
                
                // 生成位置索引（用于计算页数）
                await epubBook.locations.generate(1600);
                totalPages = epubBook.locations.length() || 1;
                currentPage = 1;
                updatePageInfo();

                // 监听翻页事件
                epubRendition.on('relocated', (location) => {
                    if (location.start) {
                        // 使用 location 计算当前页
                        const currentLocation = epubBook.locations.locationFromCfi(location.start.cfi);
                        currentPage = currentLocation + 1;
                        updatePageInfo();
                    }
                });
                
                // 添加键盘支持
                epubRendition.on('keyup', (e) => {
                    if (e.key === 'ArrowLeft') prevPage();
                    if (e.key === 'ArrowRight') nextPage();
                });
                
            } catch (error) {
                console.error('EPUB 加载错误:', error);
                showError('EPUB 加载失败: ' + error.message);
            }
        }

        // 显示阅读界面
        function showReader() {
            document.getElementById('welcome-screen').classList.add('hidden');
            document.getElementById('reader-toolbar').classList.add('active');
            document.getElementById('reader-view').classList.add('active');
        }

        // 上一页
        function prevPage() {
            if (pdfDoc && currentPage > 1) {
                currentPage--;
                renderPDFPage(currentPage);
            } else if (epubRendition) {
                epubRendition.prev();
            }
        }

        // 下一页
        function nextPage() {
            if (pdfDoc && currentPage < totalPages) {
                currentPage++;
                renderPDFPage(currentPage);
            } else if (epubRendition) {
                epubRendition.next();
            }
        }

        // 缩放
        function zoomIn() {
            zoomScale = Math.min(zoomScale + 0.2, 3.0);
            updateZoom();
        }

        function zoomOut() {
            zoomScale = Math.max(zoomScale - 0.2, 0.5);
            updateZoom();
        }

        function updateZoom() {
            document.getElementById('zoom-level').textContent = Math.round(zoomScale * 100) + '%';
            if (pdfDoc) {
                renderPDFPage(currentPage);
            }
        }

        // 更新页码
        function updatePageInfo() {
            document.getElementById('page-info').textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页`;
        }

        // 保存进度
        function saveProgress() {
            if (currentBook && currentBook.index !== undefined) {
                const books = getBooks();
                if (books[currentBook.index]) {
                    books[currentBook.index].lastPage = currentPage;
                    saveBooks(books);
                }
            }
        }

        // 显示/隐藏加载
        function showLoading() {
            document.getElementById('loading').classList.add('active');
        }

        function hideLoading() {
            document.getElementById('loading').classList.remove('active');
        }

        // 显示错误
        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 5000);
        }
    </script>
</body>
</html>
